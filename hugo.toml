baseURL = "https://heyiweiben.com/"
defaultContentLanguage = "zh"
title = "何以为本"
theme = "PaperMod"
copyright = "© 何以为本"

[languages]
  [languages.zh]
    locale = "zh-CN"
    label = "简体中文"
    weight = 1

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"

[params]
  env = "production"
  author = "何以为本"
  description = "记录 AI、技术、项目、创业与生活观察。把真实问题写下来，把长期思考留下来。"
  keywords = ["何以为本", "AI", "技术", "项目复盘", "创业观察", "生活札记", "AI札记", "个人博客"]
  DateFormat = "2006年1月2日"
  defaultTheme = "auto"
  ShowReadingTime = false
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = false
  ShowShareButtons = false
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true

[params.homeInfoParams]
  Title = ""
  Content = "一间长期写作的中文科技小站。记录 AI 工具、技术实践、项目复盘、创业观察和生活札记。这里不追热点，也不讨好算法，只把真实问题写清楚，把长期思考留下来。"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 20
